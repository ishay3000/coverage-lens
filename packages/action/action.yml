name: 'Coverage Lens Upload'
description: 'Convert Cobertura XML coverage to compact JSON and upload for the Coverage Lens browser extension'
branding:
  icon: 'eye'
  color: 'green'

inputs:
  artifact-pattern:
    description: 'Pattern to match coverage artifact names for download'
    default: 'coverage-*'
  artifact-name:
    description: 'Name of the final uploaded artifact'
    default: 'pr-coverage'
  retention-days:
    description: 'Number of days to retain the artifact'
    default: '7'
  coverage-file:
    description: 'Path to a single Cobertura XML file (skip artifact download/merge if set)'
    default: ''
  pr-files-only:
    description: 'When true, only include coverage for files changed in the PR'
    default: 'false'

runs:
  using: 'composite'
  steps:
    # ── Direct file path provided ──────────────────────────────────────
    - name: Convert direct file to JSON
      if: inputs.coverage-file != ''
      shell: bash
      run: |
        mkdir -p __coverage_final
        PR_FILTER=""
        if [ "${{ inputs.pr-files-only }}" = "true" ] && [ -n "${{ github.event.pull_request.number }}" ]; then
          gh pr diff "${{ github.event.pull_request.number }}" --name-only > __pr_files.txt 2>/dev/null || true
          if [ -s __pr_files.txt ]; then
            PR_FILTER="--pr-files-from __pr_files.txt"
          fi
        fi
        python3 "${{ github.action_path }}/xml-to-json.py" \
          "${{ inputs.coverage-file }}" \
          "__coverage_final/coverage.json" \
          $PR_FILTER
      env:
        GH_TOKEN: ${{ github.token }}

    - name: Upload direct file
      if: inputs.coverage-file != ''
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: __coverage_final/coverage.json
        retention-days: ${{ inputs.retention-days }}

    # ── Download and merge multiple artifacts ──────────────────────────
    - name: Download coverage artifacts
      if: inputs.coverage-file == ''
      uses: actions/download-artifact@v4
      with:
        pattern: ${{ inputs.artifact-pattern }}
        path: __coverage_parts
        merge-multiple: false

    - name: Find XML files
      if: inputs.coverage-file == ''
      id: find-xml
      shell: bash
      run: |
        XML_FILES=$(find __coverage_parts -name '*.xml' -type f 2>/dev/null || true)
        XML_COUNT=$(echo "$XML_FILES" | grep -c . || echo 0)
        echo "count=$XML_COUNT" >> "$GITHUB_OUTPUT"
        if [ "$XML_COUNT" -eq 0 ]; then
          echo "::error::No XML coverage files found in artifacts matching '${{ inputs.artifact-pattern }}'"
          exit 1
        fi
        echo "Found $XML_COUNT XML coverage file(s)"

    - name: Merge and convert to JSON
      if: inputs.coverage-file == '' && steps.find-xml.outputs.count != '0'
      shell: bash
      run: |
        mkdir -p __coverage_final
        # If ReportGenerator is available and multiple files exist, merge first
        XML_FILES=$(find __coverage_parts -name '*.xml' -type f)
        XML_COUNT=$(echo "$XML_FILES" | grep -c .)

        MERGE_INPUT="__coverage_parts"
        if [ "$XML_COUNT" -gt 1 ] && command -v reportgenerator &>/dev/null; then
          echo "Merging $XML_COUNT files with ReportGenerator..."
          reportgenerator \
            -reports:"$(echo $XML_FILES | tr ' ' ';')" \
            -targetdir:__coverage_merged \
            -reporttypes:Cobertura
          MERGE_INPUT="__coverage_merged"
        fi

        PR_FILTER=""
        if [ "${{ inputs.pr-files-only }}" = "true" ] && [ -n "${{ github.event.pull_request.number }}" ]; then
          gh pr diff "${{ github.event.pull_request.number }}" --name-only > __pr_files.txt 2>/dev/null || true
          if [ -s __pr_files.txt ]; then
            PR_FILTER="--pr-files-from __pr_files.txt"
          fi
        fi

        python3 "${{ github.action_path }}/xml-to-json.py" \
          "$MERGE_INPUT" \
          "__coverage_final/coverage.json" \
          $PR_FILTER
      env:
        GH_TOKEN: ${{ github.token }}

    - name: Upload merged coverage
      if: inputs.coverage-file == ''
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: __coverage_final/coverage.json
        retention-days: ${{ inputs.retention-days }}
