<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="lens" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fd"/>
      <stop offset="100%" style="stop-color:#b8d8f0"/>
    </linearGradient>
    <linearGradient id="handle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c8db0"/>
      <stop offset="100%" style="stop-color:#4a5568"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="128" height="128" rx="24" ry="24" fill="url(#bg)"/>

  <!-- Magnifying glass handle -->
  <line x1="82" y1="82" x2="105" y2="105" stroke="url(#handle)" stroke-width="10" stroke-linecap="round"/>

  <!-- Magnifying glass outer ring -->
  <circle cx="56" cy="56" r="34" fill="none" stroke="#7c8db0" stroke-width="6"/>

  <!-- Magnifying glass inner fill -->
  <circle cx="56" cy="56" r="30" fill="#0d1117" opacity="0.85"/>

  <!-- Coverage bars inside the lens -->
  <!-- Green covered lines -->
  <rect x="36" y="38" width="28" height="4" rx="2" fill="#2ea043" opacity="0.95"/>
  <rect x="36" y="46" width="22" height="4" rx="2" fill="#2ea043" opacity="0.95"/>
  <rect x="36" y="54" width="32" height="4" rx="2" fill="#2ea043" opacity="0.95"/>

  <!-- Red uncovered line -->
  <rect x="36" y="62" width="18" height="4" rx="2" fill="#da3633" opacity="0.95"/>

  <!-- Green covered line -->
  <rect x="36" y="70" width="26" height="4" rx="2" fill="#2ea043" opacity="0.95"/>

  <!-- Line number gutters -->
  <rect x="30" y="38" width="3" height="4" rx="1" fill="#2ea043" opacity="0.7"/>
  <rect x="30" y="46" width="3" height="4" rx="1" fill="#2ea043" opacity="0.7"/>
  <rect x="30" y="54" width="3" height="4" rx="1" fill="#2ea043" opacity="0.7"/>
  <rect x="30" y="62" width="3" height="4" rx="1" fill="#da3633" opacity="0.7"/>
  <rect x="30" y="70" width="3" height="4" rx="1" fill="#2ea043" opacity="0.7"/>

  <!-- Subtle glass reflection -->
  <ellipse cx="44" cy="44" rx="14" ry="10" fill="white" opacity="0.06" transform="rotate(-30 44 44)"/>
</svg>
